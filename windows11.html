Author: AI

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 11 Emulator</title>
  <link rel="stylesheet" href="win11.css">
</head>
<body>
  <!-- Desktop Background -->
  <div id="desktop">
    <!-- Example desktop icon -->
    <div class="desktop-icon" onclick="openApp('notepad')">
      <img src="https://img.icons8.com/fluency/48/000000/notepad.png"/>
      <span>Notepad</span>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="start-button" onclick="toggleStartMenu()">
      <img src="https://img.icons8.com/color/48/000000/windows-11.png" alt="Start">
    </div>
    <div id="taskbar-center">
      <!-- Running app thumbnails injected here -->
    </div>
    <div id="system-tray">
      <span id="clock"></span>
    </div>
  </div>

  <!-- Start Menu -->
  <div id="start-menu" class="glass hidden">
    <h3>Start</h3>
    <div class="start-apps">
      <div class="start-icon" onclick="openApp('notepad')">
        <img src="https://img.icons8.com/fluency/48/000000/notepad.png"/>
        <span>Notepad</span>
      </div>
      <!-- Add more icons here -->
    </div>
  </div>

  <!-- App Windows Container -->
  <div id="windows-container"></div>

  <script src="win11.js"></script>
</body>
</html>
